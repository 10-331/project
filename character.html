<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character</title>
  <link rel="stylesheet" href="./shared/header.css" />
  <link rel="stylesheet" href="./character.css" />
</head>
<body>
  <div id="commonHeaderMount"></div>

  <main class="character-page">
    <div class="character-layout">

      <!-- 左 -->
      <section class="left-pane">
        <div class="silhouette-wrap">
          <div
            class="character-silhouette"
            style="--figure-url: url('./assets/images/chars/aya-home.png');"
          ></div>
        </div>
      </section>

      <!-- 右 -->
      <section class="right-pane">

        <!-- 上：表示窓 -->
        <div class="content-window">
          <div class="content-window-inner">

            <!-- 初期 -->
            <section class="content-panel is-active" id="panel-home">
              <div class="placeholder-panel">
                <p class="placeholder-title">CHARACTER</p>
                <p class="placeholder-text">メニューから選択してください</p>
              </div>
            </section>

            <!-- プロフィール -->
            <section class="content-panel" id="panel-profile">
              <div class="single-card">
                <button class="open-image-btn"
                  data-image="./assets/images/character/profile-book.png">
                  プロフィール帳
                </button>
              </div>
            </section>

            <!-- 履歴書 -->
            <section class="content-panel" id="panel-resume">
              <div class="single-card">
                <button class="open-image-btn"
                  data-image="./assets/images/character/resume.png">
                  履歴書
                </button>
              </div>
            </section>

            <!-- ビジュアル -->
            <section class="content-panel" id="panel-visual">
              <div class="sub-tabs">
                <button class="sub-tab is-active" data-visual-tab="full">立ち絵</button>
                <button class="sub-tab" data-visual-tab="face">表情</button>
              </div>

              <div class="sub-panel is-active" id="visual-full">
                <div class="visual-grid">
                  <button class="visual-thumb" data-image="./assets/images/chars/aya-home.png">
                    <img src="./assets/images/chars/aya-home.png">
                  </button>
                  <button class="visual-thumb" data-image="./assets/images/chars/aya-visual-2.png">
                    <img src="./assets/images/chars/aya-visual-2.png">
                  </button>
                </div>
              </div>

              <div class="sub-panel" id="visual-face">
                <div class="visual-grid face-grid">
                  <button class="visual-thumb" data-image="./assets/images/chars/aya-face-1.png">
                    <img src="./assets/images/chars/aya-face-1.png">
                  </button>
                </div>
              </div>
            </section>

            <!-- トーク -->
            <section class="content-panel" id="panel-talk">
              <div class="sub-tabs">
                <button class="sub-tab is-active" data-talk-tab="ten">添</button>
                <button class="sub-tab" data-talk-tab="others">他者</button>
              </div>

              <div class="sub-panel is-active" id="talk-ten">
                <div class="text-card">
                  <p>「……別に、なんでもない」</p>
                </div>
              </div>

              <div class="sub-panel" id="talk-others">
                <div class="text-card">
                  <p>「あ、はい……」</p>
                </div>
              </div>
            </section>

            <!-- 関係性 -->
            <section class="content-panel" id="panel-relation">
              <div class="relation-vs">

                <div class="relation-messages">
                  <div class="relation-box">
                    <p class="relation-label">綾 → 相手</p>
                    <p id="relationFromAya" class="relation-text"></p>
                  </div>

                  <div class="relation-divider">VS</div>

                  <div class="relation-box">
                    <p class="relation-label">相手 → 綾</p>
                    <p id="relationToAya" class="relation-text"></p>
                  </div>
                </div>

                <div id="relationSelector" class="relation-selector"></div>
              </div>
            </section>

          </div>
        </div>

        <!-- 下：メニュー -->
        <div class="menu-area">
          <div class="menu-grid">
            <button class="main-menu-btn" data-panel="profile">プロフィール</button>
            <button class="main-menu-btn" data-panel="talk">トーク</button>
            <button class="main-menu-btn" data-panel="visual">ビジュアル</button>
            <button class="main-menu-btn" data-panel="resume">履歴書</button>
            <button class="main-menu-btn relation-btn-main" data-panel="relation">関係性</button>
          </div>
        </div>

      </section>
    </div>

    <!-- モーダル -->
    <div class="image-modal" id="imageModal">
      <div class="image-modal-backdrop"></div>
      <div class="image-modal-dialog">
        <button class="image-modal-close">×</button>
        <img id="imageModalImg">
      </div>
    </div>
  </main>

  <script src="./character.js"></script>
</body>
</html>
