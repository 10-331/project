<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character</title>
  <link rel="stylesheet" href="./assets/css/header.css" />
  <link rel="stylesheet" href="./assets/css/character.css" />
</head>
<body>
  <div id="commonHeaderMount"></div>

  <main class="character-page" id="characterPage">
    <section class="character-board">

      <div class="board-noise" aria-hidden="true"></div>
      <div class="board-vignette" aria-hidden="true"></div>
      <div class="board-corner" aria-hidden="true"></div>

      <div class="board-left">
        <div
          class="character-silhouette"
          style="--figure-url: url('/project/assets/images/chars/aya-home.png');"
          aria-hidden="true"
        ></div>
      </div>

      <div class="board-right">
        <nav class="menu-stack" aria-label="character menu">
          <button
            class="menu-card menu-card--profile"
            data-mode="image"
            data-image="./assets/images/character/profile-book.png"
            data-alt="プロフィール帳"
          >
            <span class="menu-card__deco" aria-hidden="true"></span>
            <span class="menu-card__label" data-text="プロフィール">プロフィール</span>
          </button>

          <button
            class="menu-card menu-card--talk"
            data-mode="panel"
            data-panel="talk"
          >
            <span class="menu-card__deco" aria-hidden="true"></span>
            <span class="menu-card__label" data-text="トークサンプル">トークサンプル</span>
          </button>

          <button
            class="menu-card menu-card--visual"
            data-mode="panel"
            data-panel="visual"
          >
            <span class="menu-card__deco" aria-hidden="true"></span>
            <span class="menu-card__label" data-text="ビジュアル">ビジュアル</span>
          </button>

          <button
            class="menu-card menu-card--resume"
            data-mode="image"
            data-image="./assets/images/character/resume.png"
            data-alt="履歴書"
          >
            <span class="menu-card__deco" aria-hidden="true"></span>
            <span class="menu-card__label" data-text="履歴書">履歴書</span>
          </button>

          <button
            class="menu-card menu-card--relation"
            data-mode="panel"
            data-panel="relation"
          >
            <span class="menu-card__deco" aria-hidden="true"></span>
            <span class="menu-card__label" data-text="関係性">関係性</span>
          </button>
        </nav>
      </div>

      <div class="floating-content" id="floatingContent">
        <section class="content-panel" id="panel-talk">
          <div class="content-card">
            <div class="subtabs">
              <button class="subtab is-active" data-talk-tab="ten">添</button>
              <button class="subtab" data-talk-tab="others">他者</button>
              <button class="subtab" data-talk-tab="self">独白</button>
              <button class="subtab" data-talk-tab="memo">話法</button>
            </div>

            <div class="subpanel is-active" id="talk-ten">
              <div class="text-block">
                <p>「……別に、なんでもない」</p>
                <p>「添、それ以上はだめ」</p>
                <p>「そういうとこ、ずるいよ」</p>
              </div>
            </div>

            <div class="subpanel" id="talk-others">
              <div class="text-block">
                <p>「あ、はい……すみません」</p>
                <p>「えっと、私は大丈夫です」</p>
                <p>「ありがとうございます」</p>
              </div>
            </div>

            <div class="subpanel" id="talk-self">
              <div class="text-block">
                <p>「……どうしてこんなことに」</p>
                <p>「まだ、平気」</p>
                <p>「少しだけ、考えさせて」</p>
              </div>
            </div>

            <div class="subpanel" id="talk-memo">
              <div class="text-block">
                <p><strong>一人称:</strong> 私</p>
                <p><strong>基本口調:</strong> 柔らかいが、曖昧さを含む</p>
                <p><strong>感情が乱れる時:</strong> 語尾が短くなる、言い淀みが増える</p>
                <p><strong>対 添:</strong> 他者より距離が近く、抑えた感情が滲みやすい</p>
              </div>
            </div>
          </div>
        </section>

        <section class="content-panel" id="panel-visual">
          <div class="content-card">
            <div class="subtabs">
              <button class="subtab is-active" data-visual-tab="full">立ち絵</button>
              <button class="subtab" data-visual-tab="face">表情差分</button>
            </div>

            <div class="subpanel is-active" id="visual-full">
              <div class="visual-grid">
                <button class="thumb-btn" data-image="./assets/images/chars/aya-home.png" data-alt="綾 立ち絵1">
                  <img src="./assets/images/chars/aya-home.png" alt="綾 立ち絵1" />
                </button>
                <button class="thumb-btn" data-image="./assets/images/chars/aya-visual-2.png" data-alt="綾 立ち絵2">
                  <img src="./assets/images/chars/aya-visual-2.png" alt="綾 立ち絵2" />
                </button>
                <button class="thumb-btn" data-image="./assets/images/chars/aya-visual-3.png" data-alt="綾 立ち絵3">
                  <img src="./assets/images/chars/aya-visual-3.png" alt="綾 立ち絵3" />
                </button>
              </div>
            </div>

            <div class="subpanel" id="visual-face">
              <div class="visual-grid visual-grid--face">
                <button class="thumb-btn" data-image="./assets/images/chars/aya-face-1.png" data-alt="綾 表情1">
                  <img src="./assets/images/chars/aya-face-1.png" alt="綾 表情1" />
                </button>
                <button class="thumb-btn" data-image="./assets/images/chars/aya-face-2.png" data-alt="綾 表情2">
                  <img src="./assets/images/chars/aya-face-2.png" alt="綾 表情2" />
                </button>
                <button class="thumb-btn" data-image="./assets/images/chars/aya-face-3.png" data-alt="綾 表情3">
                  <img src="./assets/images/chars/aya-face-3.png" alt="綾 表情3" />
                </button>
              </div>
            </div>
          </div>
        </section>

        <section class="content-panel" id="panel-relation">
          <div class="content-card content-card--relation">
            <div class="relation-vs">
              <div class="relation-columns">
                <div class="relation-box">
                  <p class="relation-label">綾 → 相手</p>
                  <p class="relation-text" id="relationFromAya"></p>
                </div>

                <div class="relation-box">
                  <p class="relation-label">相手 → 綾</p>
                  <p class="relation-text" id="relationToAya"></p>
                </div>
              </div>

              <div class="relation-selector" id="relationSelector"></div>
            </div>
          </div>
        </section>
      </div>

      <button
        class="secret-trigger"
        id="secretTrigger"
        type="button"
        aria-label="裏ページに切り替える"
        title="切り替え"
      >
        <span class="secret-trigger__front"></span>
        <span class="secret-trigger__back"></span>
      </button>
    </section>

    <div class="image-modal" id="imageModal" aria-hidden="true">
      <div class="image-modal-backdrop" id="imageModalBackdrop"></div>
      <div class="image-modal-dialog">
        <button class="image-modal-close" id="imageModalClose" type="button" aria-label="閉じる">×</button>
        <img id="imageModalImg" src="" alt="" />
      </div>
    </div>
  </main>

  <script src="./assets/js/header.js"></script>
  <script src="./assets/js/character.js"></script>
</body>
</html>
