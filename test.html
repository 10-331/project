<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Character Detail</title>

  <!-- まずは元CSSを読む -->
  <link rel="stylesheet" href="./shared/css/character.css" />
  <!-- 足りないところだけ上書き -->
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="pagetop"></div>

  <article class="container detail--1__3" id="character-page" data-class="detail--1__3">
    <div class="name">
      <h2 class="name__team">✈✈✈ R1ze ✈✈✈</h2>
      <h3 class="name__member">
        <span class="member--pc"><span>TEN</span><span>MURAKUMO</span></span>
        <span class="member--sp"><span>TEN MURAKUMO</span></span>
      </h3>
    </div>

    <div class="wrapper">
      <section class="detail" data-team="r1ze">
        <div class="detail__device" id="detailDevice">
          <div class="detail__device__inner">

            <p class="device--bottom">
              <img src="./shared/img/character/device_bottom.png" alt="">
            </p>

            <p class="device--top">
              <picture>
                <source srcset="./shared/img/character/device_top_sp.png" media="(max-width: 768px)">
                <img src="./shared/img/character/device_top.png" alt="">
              </picture>
            </p>

            <p class="device--lcd">
              <picture>
                <source srcset="./shared/img/character/device_lcd_sp.png" media="(max-width: 768px)">
                <img src="./shared/img/character/device_lcd.png" alt="">
              </picture>
            </p>

            <p class="device--light">
              <img src="./shared/img/character/device_lcd_light.png" alt="">
            </p>

            <p class="device--grid">
              <picture>
                <source srcset="./shared/img/character/device_lcd_grid_sp.png" media="(max-width: 768px)">
                <img src="./shared/img/character/device_lcd_grid.png" alt="">
              </picture>
            </p>

            <div class="device--button">
              <ul>
                <li class="device--button__zoom">
                  <button type="button" id="zoomOpen">
                    <picture>
                      <source srcset="./shared/img/character/device_btn_zoom_on_sp.png" media="(max-width: 768px)">
                      <img src="./shared/img/character/device_btn_zoom_on.png" alt="ZOOM">
                    </picture>
                  </button>
                </li>
                <li class="device--button__voice">
                  <button type="button">
                    <picture>
                      <source srcset="./shared/img/character/device_btn_voice_on_sp.png" media="(max-width: 768px)">
                      <img src="./shared/img/character/device_btn_voice_on.png" alt="VOICE">
                    </picture>
                  </button>
                </li>
                <li class="device--button__movie">
                  <button type="button">
                    <picture>
                      <source srcset="./shared/img/character/device_btn_movie_on_sp.png" media="(max-width: 768px)">
                      <img src="./shared/img/character/device_btn_movie_on.png" alt="MOVIE">
                    </picture>
                  </button>
                </li>
              </ul>
            </div>

            <div class="device--card">
              <p>
                <picture>
                  <source srcset="./shared/img/character/c1_3_card_sp.png" media="(max-width: 768px)">
                  <img src="./shared/img/character/c1_3_card.png" alt="">
                </picture>
              </p>
            </div>

            <div class="device--prof">
              <p>
                <span>
                  <picture>
                    <source srcset="./shared/img/character/c1_3_prof_sp.png" media="(max-width: 768px)">
                    <img src="./shared/img/character/c1_3_prof.png" alt="">
                  </picture>
                </span>
              </p>
            </div>

            <div class="device--visual">
              <p>
                <picture>
                  <source srcset="./shared/img/character/c1_3_visual_sp.png" media="(max-width: 768px)">
                  <img src="./shared/img/character/c1_3_visual.png" alt="">
                </picture>
              </p>
            </div>

            <p class="device--prev"><a href="#"><span>BACK</span></a></p>
            <p class="device--next"><a href="#"><span>NEXT</span></a></p>
          </div>
        </div>
      </section>

      <section class="items">
        <p class="items--1"><span><img src="./shared/img/character/item_1.png" alt=""></span></p>
        <p class="items--2"><span><img src="./shared/img/character/item_2.png" alt=""></span></p>
        <p class="items--3"><span>
          <picture>
            <source srcset="./shared/img/character/item_3_sp.png" media="(max-width: 768px)">
            <img src="./shared/img/character/item_3.png" alt="">
          </picture>
        </span></p>
        <p class="items--4"><span>
          <picture>
            <source srcset="./shared/img/character/item_4_sp.png" media="(max-width: 768px)">
            <img src="./shared/img/character/item_4.png" alt="">
          </picture>
        </span></p>
        <p class="items--5"><span><img src="./shared/img/character/item_5.png" alt=""></span></p>
        <p class="items--6"><span>
          <picture>
            <source srcset="./shared/img/character/item_6_sp.png" media="(max-width: 768px)">
            <img src="./shared/img/character/item_6.png" alt="">
          </picture>
        </span></p>
        <p class="items--7"><span><img src="./shared/img/character/item_7.png" alt=""></span></p>
        <p class="items--8"><span><img src="./shared/img/character/item_8.png" alt=""></span></p>
        <p class="items--9"><span>
          <picture>
            <source srcset="./shared/img/character/item_9_sp.png" media="(max-width: 768px)">
            <img src="./shared/img/character/item_9.png" alt="">
          </picture>
        </span></p>
        <p class="items--10"><span><img src="./shared/img/character/item_10.png" alt=""></span></p>
        <p class="items--11"><span><img src="./shared/img/character/item_11.png" alt=""></span></p>
        <p class="items--12"><span><img src="./shared/img/character/item_12.png" alt=""></span></p>
        <p class="items--13"><span><img src="./shared/img/character/item_13.png" alt=""></span></p>
        <p class="items--14"><span><img src="./shared/img/character/item_14.png" alt=""></span></p>
        <p class="items--15"><span><img src="./shared/img/character/item_15.png" alt=""></span></p>
        <p class="items--16"><span><img src="./shared/img/character/item_16.png" alt=""></span></p>
        <p class="items--17"><span><img src="./shared/img/character/item_17.png" alt=""></span></p>
      </section>

      <section class="localnav">
        <div class="localnav__head">
          <p class="head--member">MEMBER</p>
          <p class="head--team">✈✈✈ <span>R1ze</span> ✈✈✈</p>
        </div>
      </section>
    </div>
  </article>

  <div class="zoom--bg" id="zoomBg"></div>
  <div class="zoom" id="zoomModal" aria-hidden="true">
    <button class="zoom__close" id="zoomClose" type="button">×</button>
    <p class="zoom__visual">
      <img src="./shared/img/character/c1_3_zoom.png" alt="">
    </p>
  </div>

  <script src="./app.js"></script>
</body>
</html>
