<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Home UI Prototype</title>

  <link rel="stylesheet" href="./shared/header.css" />
  <link rel="stylesheet" href="./style2.css" />
</head>
<body>

  <!-- 共通ヘッダー -->
  <div id="commonHeaderMount"></div>

  <div class="app">
    <main class="home-screen" id="homeScreen">
      <div class="screen-frame">

        <!-- 背景 -->
        <div class="bg-layer">
          <img id="bgMorning" class="bg-image is-active" src="./assets/images/bg/bg-morning.png" alt="morning background" />
          <img id="bgEvening" class="bg-image" src="./assets/images/bg/bg-evening.png" alt="evening background" />
          <img id="bgNight" class="bg-image" src="./assets/images/bg/bg-night.png" alt="night background" />
          <div class="bg-overlay"></div>
        </div>

        <!-- 左帯 -->
        <aside class="left-strip">
          <div class="left-strip-inner">
            <div class="left-id-card">
              <div class="left-id-title">ID:</div>
              <div class="left-id-main">AZ5402</div>
              <div class="left-id-sub">[JST]</div>
              <div class="left-id-time" id="leftTime">--:--</div>
              <div class="barcode"></div>
            </div>
          </div>
        </aside>

        <!-- キャラ -->
        <section class="character-layer">
          <img
            id="mainCharacter"
            src="./assets/images/chars/aya-home.png"
            alt="character"
          />
        </section>

        <!-- 右UI -->
        <nav class="ui-buttons" aria-label="main navigation">
          <a class="ui-btn ui-btn-world sub" href="./world.html">
            <img src="./assets/images/ui/btn-world.png" alt="世界設定" />
          </a>

          <a class="ui-btn ui-btn-character sub" href="./character.html">
            <img src="./assets/images/ui/btn-character.png" alt="キャラクター紹介" />
          </a>

          <a class="ui-btn ui-btn-illust sub" href="./illust.html">
            <img src="./assets/images/ui/btn-illust.png" alt="イラスト" />
          </a>

          <a class="ui-btn ui-btn-gallery sub" href="./gallery.html">
            <img src="./assets/images/ui/btn-gallery.png" alt="ギャラリー" />
          </a>

          <a class="ui-btn ui-btn-story main" href="./novel.html">
            <img src="./assets/images/ui/btn-story.png" alt="小説" />
          </a>

          <a class="ui-btn ui-btn-main main" href="./game.html">
            <img src="./assets/images/ui/btn-main.png" alt="メインコンテンツ" />
          </a>
        </nav>

        <!-- セリフ -->
        <section class="talk-layer">
          <button class="talk-box" id="talkBox" type="button" aria-label="セリフを切り替える">
            <span id="talkName">綾</span>
            <span id="talkText">いい天気〜！今日はどこに出かけようかな〜</span>
          </button>
        </section>

      </div>
    </main>
  </div>

  <script src="./shared/header.js"></script>
  <script src="./app2.js"></script>
</body>
</html>
