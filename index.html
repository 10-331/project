<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Home UI Prototype</title>
  <script src="./app2.js" defer></script>
</head>
<body>
  <div class="app">
    <main class="home-screen" id="homeScreen">
      <div class="screen-frame">
        <!-- 背景 -->
        <div class="bg-layer">
          <img id="bgMorning" class="bg-image is-active" src="./assets/images/bg/bg-morning.jpg" alt="morning background" />
          <img id="bgEvening" class="bg-image" src="./assets/images/bg/bg-evening.jpg" alt="evening background" />
          <img id="bgNight" class="bg-image" src="./assets/images/bg/bg-night.jpg" alt="night background" />
          <div class="bg-overlay"></div>
        </div>

        <!-- 左帯 -->
        <aside class="left-strip">
          <div class="left-strip-inner">
            <div class="left-id-card">
              <div class="left-id-title">ID: TR7391</div>
              <div class="left-id-sub">[JST]</div>
              <div class="left-id-time" id="leftTime">--:--</div>
              <div class="left-id-barcode"></div>
            </div>
          </div>
        </aside>

        <!-- 右上メニュー -->
        <button class="menu-button" id="menuButton" aria-label="menu">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <!-- キャラクター -->
        <section class="character-layer">
          <img
            class="main-character"
            id="mainCharacter"
            src="./assets/images/chars/aya-home.png"
            alt="character"
          />
        </section>

        <!-- 右UI -->
        <nav class="ui-buttons" aria-label="main navigation">
          <a class="ui-btn ui-btn-world sub-ui" href="./world.html">
            <img src="./assets/images/ui/btn-world.png" alt="世界設定" />
          </a>

          <a class="ui-btn ui-btn-illust sub-ui" href="./illust.html">
            <img src="./assets/images/ui/btn-illust.png" alt="イラスト" />
          </a>

          <a class="ui-btn ui-btn-gift sub-ui" href="./gallery.html">
            <img src="./assets/images/ui/btn-gallery.png" alt="ギャラリー" />
          </a>

          <a class="ui-btn ui-btn-story main-ui" href="./novel.html">
            <img src="./assets/images/ui/btn-story.png" alt="小説" />
          </a>

          <a class="ui-btn ui-btn-main main-ui" href="./game.html">
            <img src="./assets/images/ui/btn-main.png" alt="メインコンテンツ" />
          </a>
        </nav>

        <!-- セリフ -->
        <section class="talk-layer">
          <button class="talk-box" id="talkBox" type="button" aria-label="セリフを切り替える">
            <span class="talk-name" id="talkName">綾</span>
            <span class="talk-text" id="talkText">
              いい天気〜！今日はどこに出かけようかな〜
            </span>
          </button>
        </section>

        <!-- メニューオーバーレイ -->
        <div class="menu-overlay" id="menuOverlay" hidden>
          <div class="menu-card">
            <a href="./index.html">ホーム</a>
            <a href="./game.html">ゲーム</a>
            <a href="./novel.html">小説</a>
            <a href="./world.html">世界設定</a>
            <a href="./gallery.html">ギャラリー</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="./app2.js"></script>
</body>
</html>
